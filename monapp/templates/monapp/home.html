{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recipes{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico.png' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body style="background-color: #eee;">
    <header >
        <div class="head">
            <p >Recipes are just guidelines. The real magic comes from the love and passion you put into your cooking</p>
        </div>
        <div class="head2">
            <img class="logo" src="static/images/images.png" alt="logo">
            <div class="search-container">
                <input type="text" placeholder="Search..." class="search-input">
                <button class="search-button">
                    <i class="fa-solid fa-search"></i>
                </button>
                <p><p><p><p><p><p><p><p><p></p><p><p><p></p><!--Rah ri 7me9ni css u 9adit wa7ed l escpace b had p-->
                <div class="login-container">
                    <button class="login-button">
                        <i class="fa-solid fa-user"></i> <!-- Icône de connexion -->
                    </button>
                    <div class="login-text">
                        <a href="#" class="signin-text">Sign In</a> 
                        <span>or</span> 
                        <a href="#" class="signup-text">Sign Up</a>
                    </div>
                </div><br>
                
                
            </div><div class="menu-items">
                    <p>Menu of the Day <i class="fa-solid fa-chevron-down"></i></p>
                    <p>Easy meals <i class="fa-solid fa-chevron-down"></i></p>
                    <p>Recipes <i class="fa-solid fa-chevron-down"></i></p>
                    <p>Cooking tips <i class="fa-solid fa-chevron-down"></i></p>
                    <p>Discover <i class="fa-solid fa-chevron-down"></i></p>
                    <p>Who we are <i class="fa-solid fa-chevron-down"></i></p>
                
                </div>
                
            
        </div>
        
    </header>

    {% block content %}
    {% endblock %}
</body>
</html>
